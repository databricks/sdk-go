# This workflow runs basic CI checks for the repository:
# - Unit tests
# - Linting
# - Formatting
#
# It is not responsible for running integration tests or other tests that are
# more complex to run in a CI environment.
name: ci

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    # Always run on push to main. The build cache can only be reused
    # if it was saved by a run from the repository's default branch.
    # The run result will be identical to that from the merge queue
    # because the commit is identical, yet we need to perform it to
    # seed the build cache.
    branches:
      - main

jobs:
  tests:
    runs-on: linux-ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.25"
          # - "1.26"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -v -race ./...

  lint:
    runs-on: linux-ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: | # Run golangci-lint in each directory with a go.mod file
          for mod in $(find . -name 'go.mod' -exec dirname {} \;); do
            echo "Linting $mod..."
            (cd "$mod" && golangci-lint run --timeout=5m ./...)
          done

  fmt:
    runs-on: linux-ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Run gofmt
        run: gofmt -l -w .

      - name: Fail on differences
        run: git diff --exit-code
